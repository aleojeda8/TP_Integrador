<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width, initial-scale=1.0">
    <link rel="shortcut icon" href="img/pingui.png" type="image/x-icon">
    <title>Tu opinion</title>
</head>
<body>
    <main>
        <h1>Tu opinión cuenta</h1>
        <p>Deja un comentario acerca de lo qué te pareció esta página</p>
        <form action="">
            <fieldset>
                <legend>Datos Personales</legend>
                <label for="">Nombre</label>
                <br>
                <input type="text" required>
                <br>
                <br>
            
                <label for="">Apellido</label>
                <br>
                <input type="text" required>
                <br>
                <br>
            </fieldset>
            <fieldset>
                <legend>Puntuación</legend>
                <label for="">Califica la página</label>
                <input type="number" min="0" max="10">
                <br>
                <br>
            </fieldset>
            <fieldset>
                <legend>Interés</legend>
                <label for="">La página para ti fue:</label>
                <select name="interes" id="">
                     <option value="1">Divertida</option>
                     <option value="2">Informativa</option>
                     <option value="3">Aburrida</option>
                </select>
            </fieldset>
            <br>
            <fieldset>
                <legend>Deja tu comentario</legend>
                <br>
                <textarea rows="8" cols="50" placeholder="Escribe aquí"></textarea>
                <br>
                <br>
            </fieldset>
            <br>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpiar">
        </form>
        <p><a href="index.html">
            <img src="img/ab67616d00001e02311f00c1c2e4935c01a6be4f.png" width="20"> VOLVER </a>
        </p>
    </main>
</body>
</html>
